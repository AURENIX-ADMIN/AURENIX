<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit — Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>body { background: #0d1117; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl mx-auto mb-3">O</div>
      <h1 class="text-xl font-semibold text-[#e6edf3]">Orbit</h1>
      <p class="text-sm text-[#8b949e] mt-1">Panel de control AURENIX</p>
    </div>

    <!-- Form -->
    <div style="background:#161b22; border:1px solid #30363d; border-radius:12px;" class="p-6">
      {% if error %}
      <div class="mb-4 px-3 py-2 rounded-lg bg-red-900/30 border border-red-800/50 text-sm text-red-400">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-[#8b949e] mb-1.5">Email</label>
          <input
            type="email"
            name="email"
            required
            autocomplete="email"
            class="w-full px-3 py-2 rounded-lg text-sm text-[#e6edf3] placeholder-[#8b949e] outline-none transition-colors"
            style="background:#0d1117; border:1px solid #30363d;"
            placeholder="admin@aurenix.es"
          >
        </div>
        <div>
          <label class="block text-xs font-medium text-[#8b949e] mb-1.5">Contraseña</label>
          <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full px-3 py-2 rounded-lg text-sm text-[#e6edf3] placeholder-[#8b949e] outline-none transition-colors"
            style="background:#0d1117; border:1px solid #30363d;"
          >
        </div>
        <button
          type="submit"
          class="w-full py-2 px-4 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors mt-2"
        >
          Acceder
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-[#8b949e] mt-4">Acceso restringido — solo equipo AURENIX</p>
  </div>
</body>
</html>
