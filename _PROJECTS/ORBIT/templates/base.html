<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Orbit{% endblock %} — AURENIX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#161b22',
            border: '#30363d',
            'text-primary': '#e6edf3',
            'text-muted': '#8b949e',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/orbit.css">
  <style>
    body { background-color: #0d1117; color: #e6edf3; font-family: 'Inter', sans-serif; }
    .sidebar-link { @apply flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[#8b949e] hover:text-[#e6edf3] hover:bg-[#21262d] transition-colors; }
    .sidebar-link.active { @apply text-[#e6edf3] bg-[#21262d]; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    .stat-badge { @apply text-xs font-mono font-medium px-2 py-0.5 rounded-full; }
    .status-dot { @apply w-2 h-2 rounded-full inline-block; }
  </style>
</head>
<body class="h-full flex">

  <!-- Sidebar -->
  <aside class="w-56 flex-shrink-0 h-screen sticky top-0 flex flex-col border-r border-[#30363d] bg-[#161b22]">
    <!-- Logo -->
    <div class="px-4 py-5 border-b border-[#30363d]">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-sm">O</div>
        <span class="font-semibold text-[#e6edf3] tracking-tight">Orbit</span>
        <span class="text-[10px] text-[#8b949e] ml-auto font-mono">AURENIX</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
        Command Center
      </a>
      <a href="/clients" class="sidebar-link {% if '/clients' in request.url.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2h5m6 0H9m6 0v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4"/></svg>
        Clientes
      </a>
      <a href="/costs" class="sidebar-link {% if '/costs' in request.url.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Costes
      </a>
      <a href="/alerts" class="sidebar-link {% if '/alerts' in request.url.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0a3 3 0 01-6 0"/></svg>
        Alertas
        <span id="alert-badge" class="ml-auto text-xs bg-red-900/60 text-red-400 font-mono px-1.5 py-0.5 rounded hidden">0</span>
      </a>
      <div class="pt-3 pb-1">
        <p class="px-3 text-[10px] font-semibold uppercase tracking-widest text-[#8b949e]">Acciones</p>
      </div>
      <a href="/clients/new" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nuevo Cliente
      </a>
      <a href="/systems/new" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
        Nuevo Sistema
      </a>
    </nav>

    <!-- User footer -->
    <div class="px-4 py-3 border-t border-[#30363d]">
      <div class="flex items-center justify-between">
        <span class="text-xs text-[#8b949e] truncate">{% if user %}{{ user.email }}{% endif %}</span>
        <form action="/logout" method="POST">
          <button type="submit" class="text-xs text-[#8b949e] hover:text-red-400 transition-colors ml-2">
            Salir
          </button>
        </form>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto">
    <!-- Topbar -->
    <div class="sticky top-0 z-10 border-b border-[#30363d] bg-[#0d1117]/80 backdrop-blur-sm px-6 py-3 flex items-center justify-between">
      <h1 class="text-sm font-semibold text-[#e6edf3]">{% block page_title %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-3 text-xs text-[#8b949e]">
        <span id="last-refresh" class="font-mono"></span>
        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse" title="Conectado"></div>
      </div>
    </div>

    <!-- Page content -->
    <div class="p-6">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/js/orbit.js"></script>
  {% block scripts %}{% endblock %}
  <script>
    // Update last refresh timestamp
    function updateClock() {
      const el = document.getElementById('last-refresh');
      if (el) el.textContent = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Poll open alerts count every 30s for badge
    async function pollAlerts() {
      try {
        const r = await fetch('/alerts/api/open');
        const data = await r.json();
        const badge = document.getElementById('alert-badge');
        if (badge) {
          const count = data.filter(a => a.severity === 'critica' || a.severity === 'alta').length;
          if (count > 0) {
            badge.textContent = count;
            badge.classList.remove('hidden');
          } else {
            badge.classList.add('hidden');
          }
        }
      } catch(e) {}
    }
    setInterval(pollAlerts, 30000);
    pollAlerts();
  </script>
</body>
</html>
