name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - '_PROJECTS/AURENIX AGENCY/aurenix-monorepo/apps/dashboard/**'
      - '_PROJECTS/AURENIX AGENCY/aurenix-monorepo/packages/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: '_PROJECTS/AURENIX AGENCY/aurenix-monorepo'
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        working-directory: '_PROJECTS/AURENIX AGENCY/aurenix-monorepo'
        run: pnpm --filter dashboard build
        env:
          N8N_API_URL: ${{ secrets.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          S1_WORKFLOW_ID: ${{ secrets.S1_WORKFLOW_ID }}
          S2_WORKFLOW_ID: ${{ secrets.S2_WORKFLOW_ID }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /data/aurenix-deploy
            git pull origin main

            # Build Docker image
            docker build \
              -f _PROJECTS/AURENIX\ AGENCY/aurenix-monorepo/apps/dashboard/Dockerfile \
              -t aurenix-dashboard:latest \
              --build-arg N8N_API_URL="${{ secrets.N8N_API_URL }}" \
              --build-arg N8N_API_KEY="${{ secrets.N8N_API_KEY }}" \
              .

            # Stop old container and start new one
            docker stop aurenix-dashboard 2>/dev/null || true
            docker rm aurenix-dashboard 2>/dev/null || true
            docker run -d \
              --name aurenix-dashboard \
              --restart unless-stopped \
              -p 3001:3001 \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.dashboard.rule=Host(\`dashboard.aurenix.cloud\`)" \
              -l "traefik.http.routers.dashboard.tls=true" \
              -l "traefik.http.routers.dashboard.tls.certresolver=letsencrypt" \
              aurenix-dashboard:latest

            # Cleanup old images
            docker image prune -f

            echo "✅ Dashboard deployed successfully"

      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ID_JOSE }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Dashboard deployado*
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            Autor: ${{ github.actor }}

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ID_JOSE }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 *DEPLOY FALLIDO — Dashboard*
            Commit: `${{ github.sha }}`
            Revisa: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
