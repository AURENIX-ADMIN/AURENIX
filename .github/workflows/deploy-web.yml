name: Deploy Web Pública

on:
  push:
    branches: [main]
    paths:
      - '_PROJECTS/WEB/public-web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Web Pública
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: '_PROJECTS/WEB/public-web'
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: '_PROJECTS/WEB/public-web'
        run: pnpm build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /data/aurenix-deploy
            git pull origin main

            docker build \
              -f _PROJECTS/WEB/public-web/Dockerfile \
              -t aurenix-web:latest \
              .

            docker stop aurenix-web 2>/dev/null || true
            docker rm aurenix-web 2>/dev/null || true
            docker run -d \
              --name aurenix-web \
              --restart unless-stopped \
              -p 3000:3000 \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.web.rule=Host(\`aurenix.cloud\`) || Host(\`www.aurenix.cloud\`)" \
              -l "traefik.http.routers.web.tls=true" \
              -l "traefik.http.routers.web.tls.certresolver=letsencrypt" \
              aurenix-web:latest

            docker image prune -f
            echo "✅ Web pública desplegada"

      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ID_JOSE }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Web pública desplegada*
            Commit: `${{ github.sha }}`
            URL: https://aurenix.cloud

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ID_JOSE }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚨 *DEPLOY FALLIDO — Web pública*
            Commit: `${{ github.sha }}`
            Revisa: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
